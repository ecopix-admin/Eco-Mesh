name: Build Eco Mesh APK
on: [push]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Cordova və lazımi asılılıqları quraşdırırıq
      - name: Install Cordova
        run: npm install -g cordova

      # Android platformasını əlavə edərkən mühiti yoxlayırıq
      - name: Build APK
        run: |
          cordova platform add android
          cordova build android --release

      # APK-nı "Actions" bölməsindən yükləmək üçün hazırlayırıq
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Eco-Mesh-App
          path: platforms/android/app/build/outputs/apk/release/*.apk
